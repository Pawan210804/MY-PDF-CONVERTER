<form id="upload-form" action="/convert" method="post" enctype="multipart/form-data">
    <input type="file" name="file" id="file" required>
    
    <select name="direction">
        <option value="to_doc">PDF ➜ Word (.docx)</option>
        <option value="to_pdf">Word (.docx) ➜ PDF</option>
    </select>
    
    <button type="submit" id="submit-btn">Convert Now</button>
</form>

<div id="loader" style="display: none; margin-top: 20px;">
    <div class="spinner"></div>
    <p>Converting... please wait.</p>
</div>

<script>
    const form = document.getElementById('upload-form');
    const btn = document.getElementById('submit-btn');
    const loader = document.getElementById('loader');

    form.onsubmit = function() {
        btn.style.display = 'none';   // Hide button
        loader.style.display = 'block'; // Show loader
    };
</script>

<style>
    /* Simple CSS Spinner */
    .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 4px solid #fff;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
