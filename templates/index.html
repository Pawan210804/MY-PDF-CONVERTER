<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConvertFlow | Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-card">
        <h1>ConvertFlow</h1>
        <p style="opacity: 0.7; font-size: 0.9rem;">Universal Aesthetic Converter</p>
        
        <div style="height:50px; background:rgba(255,255,255,0.05); margin-bottom:15px; border-radius:8px; line-height:50px; font-size:10px; opacity:0.3;">AD SPACE</div>

        <form action="/convert" method="post" enctype="multipart/form-data" id="upload-form">
            <input type="file" name="file" required>
            
            <select name="direction">
                <option value="to_pdf">Any Doc/Image ➜ PDF</option>
                <option value="to_doc">PDF ➜ Word (.docx)</option>
                <option value="pdf_to_img">PDF ➜ Image (.png)</option>
            </select>
            
            <button type="submit" class="btn-primary" id="submit-btn">Convert Now</button>
        </form>

        <div id="loader" style="display:none; margin-top:20px;">
            <p>Processing your file... ✨</p>
        </div>

        <div class="footer-links" style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <a href="/about">About</a>
            <a href="/privacy">Privacy</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
